<!DOCTYPE html>
<html>
<head>
    <title>Advanced Table</title>
</head>
<body>

<h1>Advanced Table Example</h1>

<table border="1">
    <caption>Student Marks</caption>

    <thead>
        <tr>
            <th rowspan="2">Name</th>
            <th colspan="3">Marks</th>
        </tr>
        <tr>
            <th>Math</th>
            <th>Science</th>
            <th>Computer</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>Arun</td>
            <td>85</td>
            <td>90</td>
            <td>88</td>
        </tr>
        <tr>
            <td>Priya</td>
            <td>92</td>
            <td>89</td>
            <td>95</td>
        </tr>
    </tbody>

</table>

</html>
